services:
  bass:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    environment:
      BASS_ADDR: ":8080"
      BASS_DB_PATH: "/data/bass.db"
      BASS_PUBLIC_BASE_URL: "http://localhost:8080"
      BASS_ALLOWED_ORIGINS: "localhost:5173,localhost:4173"
      # The demo runs without OIDC so the focus stays on the sync mechanism.
      # For a real deployment, drop --no-auth and set BASS_OIDC_ISSUER /
      # BASS_OIDC_AUDIENCE / BASS_OIDC_CLIENT_ID / BASS_OIDC_CLIENT_SECRET.
      BASS_NO_AUTH: "true"
    volumes:
      - bass-data:/data
    ports:
      - "8080:8080"

  demo:
    build:
      context: ..
      dockerfile: docker/Dockerfile.demo
      args:
        VITE_BASS_URL: "http://localhost:8080"
        VITE_APP_ID: "bass-demo"
    ports:
      - "5173:80"
    depends_on:
      - bass

  # One-shot setup container: registers the demo app with bass. Since bass
  # runs in --no-auth mode, the admin endpoint accepts requests without a
  # token. Invoke with:
  #
  #   docker compose -f docker/docker-compose.yml run --rm setup
  #
  setup:
    image: alpine:3.20
    profiles: ["setup"]
    environment:
      BASS_URL: "http://bass:8080"
      APP_ID: "bass-demo"
      APP_ORIGIN: "http://localhost:5173"
      APP_REDIRECT: "http://localhost:5173/sync-cb"
    volumes:
      - ../apps/demo/scripts:/scripts:ro
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -e
        apk add --no-cache curl python3 bash >/dev/null
        exec bash /scripts/setup.sh
    depends_on:
      - bass

volumes:
  bass-data:
