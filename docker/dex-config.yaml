issuer: http://dex:5556/dex

storage:
  type: memory

web:
  http: 0.0.0.0:5556

oauth2:
  skipApprovalScreen: true
  alwaysShowLoginScreen: false

staticClients:
  - id: bass
    name: bass
    secret: bass-dev-secret
    redirectURIs:
      - http://localhost:8080/v1/pair/callback

enablePasswordDB: true

staticPasswords:
  # email: demo@example.com  /  password: demo
  - email: demo@example.com
    # bcrypt of "demo"
    hash: "$2a$10$2b2cu2a3LANeKqI9ueKLXuLAzPwLkfQTQ8M1aHaG2dB6E9YkBgQXi"
    username: demo
    userID: "08a8684b-db88-4b73-90a9-3cd1661f5466"

# Map all authenticated users into the bass.sync scope. Add a separate group
# claim mapping if you want bass.admin for specific users.
oauth2:
  responseTypes: ["code"]
  skipApprovalScreen: true
  alwaysShowLoginScreen: false
